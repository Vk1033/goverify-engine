replicaCount: 1

image:
  repository: goverify-engine
  pullPolicy: IfNotPresent
  # Overridden by tags in deployment
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

api:
  name: kyc-api
  replicas: 2
  env:
    ENVIRONMENT: development
    PORT: 8080
    KAFKA_BROKERS: kafka:9092
    MILVUS_ADDRESS: milvus:19530
    REDIS_ADDRESS: redis:6379

worker:
  name: kyc-worker
  replicas: 3
  env:
    ENVIRONMENT: development
    KAFKA_BROKERS: kafka:9092
    MILVUS_ADDRESS: milvus:19530
    REDIS_ADDRESS: redis:6379

# Dependency configuration (placeholders for subcharts or external services)
kafka:
  enabled: true
  host: kafka
  port: 9092

milvus:
  enabled: true
  host: milvus
  port: 19530

redis:
  enabled: true
  host: redis
  port: 6379
