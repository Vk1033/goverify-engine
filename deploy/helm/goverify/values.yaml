# Global Settings
replicaCount: 1

image:
  repository: goverify-engine
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: LoadBalancer
  port: 8080

# Secrets
secrets:
  jwtSecret: "super-secret-key-for-hackathon"
  aesKey: "6861636b6174686f6e2d7365637572652d7069692d656e6372797074696f6e2d"

# API Service
api:
  name: kyc-api
  replicas: 1
  image:
    repository: goverify-engine-kyc-api
    tag: latest
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  env:
    ENVIRONMENT: production
    PORT: 8080
    KAFKA_BROKERS: kafka-svc:9092
    KAFKA_ENROLL_TOPIC: kyc_enroll
    KAFKA_VERIFY_TOPIC: kyc_verify
    MILVUS_ADDRESS: milvus-svc:19530
    REDIS_ADDRESS: redis-svc:6379
    AI_SERVICE_URL: http://kyc-ai-svc:5000

# Worker Service
worker:
  name: kyc-worker
  replicas: 1
  image:
    repository: goverify-engine-kyc-worker
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    ENVIRONMENT: production
    PORT: 9090
    KAFKA_BROKERS: kafka-svc:9092
    KAFKA_ENROLL_TOPIC: kyc_enroll
    KAFKA_VERIFY_TOPIC: kyc_verify
    MILVUS_ADDRESS: milvus-svc:19530
    REDIS_ADDRESS: redis-svc:6379
    AI_SERVICE_URL: http://kyc-ai-svc:5000

# AI Service
ai:
  name: kyc-ai
  replicas: 1
  image:
    repository: goverify-engine-ai-service
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  env:
    ENVIRONMENT: production
    PORT: 5000

# Infrastructure toggle
infra:
  enabled: true
  milvus:
    image: milvusdb/milvus:v2.4.15
  kafka:
    messageMaxBytes: "10485760"

# Observability Settings
observability:
  enabled: true
  type: LoadBalancer
  loki:
    image: grafana/loki:latest
  promtail:
    enabled: true
    image: grafana/promtail:latest

# Ingress Settings
ingress:
  enabled: false
