apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ai.name }}
  labels:
    app: {{ .Values.ai.name }}
spec:
  replicas: {{ .Values.ai.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.ai.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.ai.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ .Values.ai.name }}
          image: "{{ .Values.ai.image.repository }}:{{ .Values.ai.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ai.env.PORT }}
          resources:
            {{- toYaml .Values.ai.resources | nindent 12 }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.ai.env.ENVIRONMENT }}
            - name: PORT
              value: {{ .Values.ai.env.PORT | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.ai.env.OTEL_EXPORTER_OTLP_ENDPOINT }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.ai.env.OTEL_EXPORTER_OTLP_INSECURE | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.env.PORT }}
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.env.PORT }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.env.PORT }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ai.name }}-svc
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: {{ .Values.ai.env.PORT }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.ai.name }}
