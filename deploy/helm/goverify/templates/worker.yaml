apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name }}
  labels:
    app: {{ .Values.worker.name }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.worker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.worker.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z kafka-svc 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-milvus
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z milvus-svc 19530; do echo waiting for milvus; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z redis-svc 6379; do echo waiting for redis; sleep 2; done']
      containers:

        - name: {{ .Values.worker.name }}
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.worker.env.PORT }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.worker.env.ENVIRONMENT }}
            - name: PORT
              value: {{ .Values.worker.env.PORT | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.worker.env.KAFKA_BROKERS }}
            - name: KAFKA_ENROLL_TOPIC
              value: {{ .Values.worker.env.KAFKA_ENROLL_TOPIC }}
            - name: KAFKA_VERIFY_TOPIC
              value: {{ .Values.worker.env.KAFKA_VERIFY_TOPIC }}
            - name: MILVUS_ADDRESS
              value: {{ .Values.worker.env.MILVUS_ADDRESS }}
            - name: REDIS_ADDRESS
              value: {{ .Values.worker.env.REDIS_ADDRESS }}
            - name: AI_SERVICE_URL
              value: {{ .Values.worker.env.AI_SERVICE_URL }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.worker.env.OTEL_EXPORTER_OTLP_ENDPOINT }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.worker.env.OTEL_EXPORTER_OTLP_INSECURE | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: JWT_SECRET
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: AES_KEY
          readinessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.worker.env.PORT }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.worker.env.PORT }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.worker.name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.worker.env.PORT }}
      targetPort: {{ .Values.worker.env.PORT }}
      protocol: TCP
      name: metrics
  selector:
    app: {{ .Values.worker.name }}
