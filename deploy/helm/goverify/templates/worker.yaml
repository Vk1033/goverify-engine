apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name }}
  labels:
    app: {{ .Values.worker.name }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.worker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.worker.name }}
    spec:
      containers:
        - name: {{ .Values.worker.name }}
          image: "{{ .Values.image.repository }}-worker:{{ .Values.image.tag }}"
          env:
            - name: ENVIRONMENT
              value: {{ .Values.worker.env.ENVIRONMENT }}
            - name: KAFKA_BROKERS
              value: {{ .Values.worker.env.KAFKA_BROKERS }}
            - name: MILVUS_ADDRESS
              value: {{ .Values.worker.env.MILVUS_ADDRESS }}
            - name: REDIS_ADDRESS
              value: {{ .Values.worker.env.REDIS_ADDRESS }}
            - name: ONNX_MODEL_PATH
              value: {{ .Values.worker.env.ONNX_MODEL_PATH | quote }}
            - name: ONNX_LIB_PATH
              value: {{ .Values.worker.env.ONNX_LIB_PATH | quote }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
