apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name }}
  labels:
    app: {{ .Values.worker.name }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.worker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.worker.name }}
    spec:
      containers:
        - name: {{ .Values.worker.name }}
          image: "{{ .Values.image.repository }}-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.worker.env.ENVIRONMENT }}
            - name: KAFKA_BROKERS
              value: {{ .Values.worker.env.KAFKA_BROKERS }}
            - name: KAFKA_ENROLL_TOPIC
              value: {{ .Values.worker.env.KAFKA_ENROLL_TOPIC }}
            - name: KAFKA_VERIFY_TOPIC
              value: {{ .Values.worker.env.KAFKA_VERIFY_TOPIC }}
            - name: MILVUS_ADDRESS
              value: {{ .Values.worker.env.MILVUS_ADDRESS }}
            - name: REDIS_ADDRESS
              value: {{ .Values.worker.env.REDIS_ADDRESS }}
            - name: AI_SERVICE_URL
              value: {{ .Values.worker.env.AI_SERVICE_URL }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: JWT_SECRET
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: AES_KEY
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
