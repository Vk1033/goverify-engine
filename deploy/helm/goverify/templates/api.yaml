apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  labels:
    app: {{ .Values.api.name }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.api.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.api.name }}
    spec:
      containers:
        - name: {{ .Values.api.name }}
          image: "{{ .Values.image.repository }}-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.env.PORT }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.api.env.ENVIRONMENT }}
            - name: PORT
              value: {{ .Values.api.env.PORT | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.api.env.KAFKA_BROKERS }}
            - name: MILVUS_ADDRESS
              value: {{ .Values.api.env.MILVUS_ADDRESS }}
            - name: REDIS_ADDRESS
              value: {{ .Values.api.env.REDIS_ADDRESS }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.env.PORT }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.env.PORT }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.api.env.PORT }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.api.name }}
