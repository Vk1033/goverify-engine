services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.15
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - "etcd"
      - "minio"
    ports:
      - "19530:19530"

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"

  kyc-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - KAFKA_BROKERS=kafka:29092
      - MILVUS_ADDRESS=milvus-standalone:19530
      - REDIS_ADDRESS=redis:6379
      - AI_SERVICE_URL=http://ai-service:5000
    depends_on:
      - kafka
      - milvus-standalone
      - redis
      - ai-service

  kyc-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      - ENVIRONMENT=development
      - KAFKA_BROKERS=kafka:29092
      - MILVUS_ADDRESS=milvus-standalone:19530
      - REDIS_ADDRESS=redis:6379
      - AI_SERVICE_URL=http://ai-service:5000
    ports:
      - "9095:9090"
    depends_on:
      - kafka
      - milvus-standalone
      - redis
      - ai-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.45
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16687:16686" # UI
      - "4319:4317" # OTLP gRPC (Host:4319 -> Container:4317)
      - "4318:4318" # OTLP HTTP

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus:/etc/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - kyc-api
      - kyc-worker

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: "-config.file=/etc/loki/local-config.yaml"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/promtail:/etc/promtail
    command: "-config.file=/etc/promtail/promtail-config.yml"
    depends_on:
      - loki
